<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SaveForge</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css" crossorigin="anonymous">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lz-string/1.4.4/lz-string.min.js" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#07101b;--s1:#0c1726;--s2:#111f30;--s3:#19293c;
  --b0:#1c2d42;--b1:#253650;--b2:#2d4060;
  --tx:#bfd0ec;--mu:#3e5878;--hi:#90aece;
  --ca:#e5791a;--cb:#ffa640;
  --bl:#4a9eff;--gr:#3dcf7a;--rd:#ff5060;--yl:#ffd040;--pu:#b07aff;--cy:#4dd9ff;
  --mono:'Cascadia Code','Fira Code','Consolas','Courier New',monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --r:4px;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--tx);font-family:var(--mono);font-size:13px}
#app{display:grid;grid-template-rows:44px 34px 1fr 22px;height:100vh;overflow:hidden}

/* ── HEADER ── */
#hdr{background:var(--s1);border-bottom:1px solid var(--b0);display:flex;align-items:center;padding:0 14px;gap:8px}
#logo{font-size:12px;font-weight:700;letter-spacing:.2em;color:var(--cb);flex-shrink:0}
#logo b{color:var(--ca)}
.spacer{flex:1}
.hbtn{display:flex;align-items:center;gap:5px;padding:4px 10px;background:var(--s3);border:1px solid var(--b1);color:var(--tx);cursor:pointer;font-family:var(--mono);font-size:12px;border-radius:var(--r);transition:.12s;white-space:nowrap;outline:none}
.hbtn:hover:not(:disabled){border-color:var(--ca);background:var(--s2);color:var(--cb)}
.hbtn.p{border-color:var(--ca);color:var(--cb)}
.hbtn.p:hover:not(:disabled){background:rgba(229,121,26,.14)}
.hbtn:disabled{opacity:.3;cursor:default}
.hbtn i{font-size:14px}
.undo-info{font-size:11px;color:var(--mu);font-family:var(--sans)}

/* ── TABS ── */
#tabs{background:var(--s1);border-bottom:2px solid var(--b0);display:flex;align-items:stretch;overflow-x:auto;scrollbar-width:none}
#tabs

/* ── ES3 UNLOCK PANEL ── */
.es3-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:16px;padding:24px}
.es3-card{background:var(--s2);border:1px solid var(--b1);border-radius:8px;
  padding:24px 28px;width:420px;max-width:94vw;display:flex;flex-direction:column;gap:14px}
.es3-hdr{display:flex;align-items:center;gap:10px;font-family:var(--sans)}
.es3-hdr i{font-size:22px;color:var(--ca)}
.es3-title{font-size:14px;color:var(--tx);font-weight:600}
.es3-sub{font-size:12px;color:var(--mu);font-family:var(--sans);line-height:1.6}
.es3-row{display:flex;gap:8px;align-items:center}
.es3-inp{flex:1;background:var(--bg);border:1px solid var(--b1);color:var(--tx);
  padding:6px 10px;border-radius:var(--r);font-family:var(--mono);font-size:13px;outline:none}
.es3-inp:focus{border-color:var(--ca)}
.es3-status{font-size:11px;font-family:var(--sans);min-height:16px;transition:.2s}
.es3-status.ok{color:var(--gr)}
.es3-status.err{color:var(--rd)}
.es3-status.loading{color:var(--mu)}
.es3-schemes{font-size:11px;color:var(--mu);font-family:var(--sans)}
.es3-schemes summary{cursor:pointer;color:var(--mu)}
.es3-schemes summary:hover{color:var(--tx)}
.es3-schemes ul{margin-top:6px;padding-left:16px;line-height:2}

/* ── LOG VIEWER ── */
.log-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;font-family:var(--mono);font-size:12px}
.log-toolbar{display:flex;gap:8px;align-items:center;padding:6px 10px;
  border-bottom:1px solid var(--b0);background:var(--s1);flex-shrink:0}
.log-filter{background:var(--s2);border:1px solid var(--b0);color:var(--tx);
  padding:3px 8px;border-radius:var(--r);font-family:var(--mono);font-size:12px;
  outline:none;flex:1}
.log-filter:focus{border-color:var(--ca)}
.log-lvl-btns{display:flex;gap:2px}
.log-lvl{padding:2px 7px;border:1px solid var(--b0);background:transparent;
  cursor:pointer;font-size:11px;border-radius:3px;font-family:var(--sans);transition:.1s}
.log-lvl:hover,.log-lvl.act{color:var(--tx);border-color:var(--b1);background:var(--s2)}
.log-body{overflow:auto;flex:1;padding:4px 0}
.log-line{display:flex;gap:0;padding:1px 0;line-height:1.6}
.log-line:hover{background:var(--s2)}
.log-ln{color:var(--mu);width:44px;text-align:right;padding-right:10px;
  flex-shrink:0;font-size:11px;user-select:none}
.log-txt{flex:1;padding-right:12px;white-space:pre-wrap;word-break:break-all}
.log-line.ll-error .log-txt{color:var(--rd)}
.log-line.ll-warn  .log-txt{color:var(--yl)}
.log-line.ll-debug .log-txt{color:var(--mu)}
.log-line.ll-info  .log-txt{color:var(--tx)}
.log-line.ll-stack .log-txt{color:var(--mu);padding-left:14px;font-size:11px}

/* ── VDF / plain format badge ── */

/* ══ GALLERY ══════════════════════════════════════════════════ */
.gal-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.gal-toolbar{display:flex;gap:8px;align-items:center;padding:7px 10px;
  border-bottom:1px solid var(--b0);background:var(--s1);flex-wrap:wrap;flex-shrink:0}
.gal-key-row{display:flex;align-items:center;gap:6px}
.gal-key-lbl{font-size:11px;color:var(--mu);font-family:var(--sans);white-space:nowrap}
.gal-key-inp{background:var(--s2);border:1px solid var(--b0);color:var(--tx);
  padding:3px 8px;border-radius:var(--r);font-family:var(--mono);font-size:11px;
  outline:none;width:240px;letter-spacing:.04em}
.gal-key-inp:focus{border-color:var(--ca)}
.gal-key-ok{background:rgba(61,207,122,.1);border:1px solid rgba(61,207,122,.3);
  color:var(--gr);padding:2px 7px;border-radius:var(--r);font-size:11px;font-family:var(--sans)}
.gal-count{font-size:11px;color:var(--mu);font-family:var(--sans);white-space:nowrap}
.gal-sel{background:var(--s2);border:1px solid var(--b0);color:var(--tx);
  padding:3px 7px;border-radius:var(--r);font-family:var(--sans);font-size:11px;
  outline:none;cursor:pointer}
.gal-body{overflow:auto;flex:1;padding:10px}
.gal-grid{display:grid;gap:8px}
.gal-grid.gz-xs  {grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}
.gal-grid.gz-s   {grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
.gal-grid.gz-m   {grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}
.gal-grid.gz-l   {grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.gal-grid.gz-xl  {grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
.gal-item{background:var(--s2);border:1px solid var(--b0);border-radius:var(--r);
  overflow:hidden;cursor:pointer;transition:.15s;display:flex;flex-direction:column;
  position:relative}
.gal-item:hover{border-color:var(--ca);transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(0,0,0,.4)}
.gal-item.selected{border-color:var(--ca);outline:2px solid rgba(229,121,26,.4)}
.gal-thumb-wrap{width:100%;aspect-ratio:1;background:repeating-conic-gradient(
  var(--s3) 0% 25%, var(--s2) 0% 50%) 0 0/16px 16px;overflow:hidden;display:flex;
  align-items:center;justify-content:center}
.gal-thumb{width:100%;height:100%;object-fit:contain;display:block}
.gal-info{padding:5px 7px;border-top:1px solid var(--b0);background:rgba(7,16,27,.5)}
.gal-iname{font-size:10px;color:var(--hi);font-family:var(--sans);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.gal-isize{font-size:9px;color:var(--mu);font-family:var(--sans);margin-top:1px}
.gal-err{font-size:10px;color:var(--rd);font-family:var(--sans);padding:4px}
.gal-loading{display:flex;align-items:center;justify-content:center;height:100%;
  color:var(--mu);font-family:var(--sans);font-size:13px;gap:8px}
.gal-empty{padding:40px;color:var(--mu);font-family:var(--sans);text-align:center;
  line-height:2}
/* Lightbox */
#gal-lb{position:fixed;inset:0;z-index:9995;display:none;
  align-items:center;justify-content:center}
#gal-lb.show{display:flex}
.gal-lb-bg{position:absolute;inset:0;background:rgba(5,10,18,.94);cursor:pointer}
.gal-lb-box{position:relative;z-index:1;background:var(--s1);border:1px solid var(--b1);
  border-radius:8px;padding:14px;max-width:92vw;max-height:93vh;display:flex;
  flex-direction:column;align-items:center;gap:10px;overflow:hidden}
.gal-lb-hdr{display:flex;align-items:center;width:100%;gap:10px}
.gal-lb-fname{font-size:12px;color:var(--tx);font-family:var(--sans);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.gal-lb-close{background:none;border:none;color:var(--mu);cursor:pointer;
  font-size:16px;padding:2px 6px;border-radius:3px;font-family:var(--mono)}
.gal-lb-close:hover{color:var(--rd);background:rgba(255,80,96,.12)}
.gal-lb-imgwrap{flex:1;overflow:hidden;display:flex;align-items:center;
  justify-content:center;background:repeating-conic-gradient(
  var(--s2) 0% 25%, var(--s3) 0% 50%) 0 0/20px 20px;border-radius:4px;
  min-height:200px;min-width:300px}
.gal-lb-img{max-width:85vw;max-height:78vh;object-fit:contain;display:block;
  image-rendering:pixelated}
.gal-lb-img.smooth{image-rendering:auto}
.gal-lb-meta{font-size:11px;color:var(--mu);font-family:var(--sans);
  text-align:center;line-height:1.6}
.gal-lb-foot{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center}
.gal-nav{position:fixed;top:50%;transform:translateY(-50%);
  background:rgba(12,23,38,.85);border:1px solid var(--b1);color:var(--tx);
  cursor:pointer;font-size:20px;padding:10px 14px;border-radius:var(--r);
  transition:.1s;z-index:9996;user-select:none}
.gal-nav:hover{border-color:var(--ca);color:var(--cb)}
.gal-nav.prev{left:10px}
.gal-nav.next{right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{display:none}
.tab{display:flex;align-items:center;gap:5px;padding:0 11px;cursor:pointer;border-right:1px solid var(--b0);white-space:nowrap;color:var(--mu);font-size:12px;transition:.1s;position:relative;min-width:0;max-width:180px}
.tab:hover{color:var(--tx);background:var(--s2)}
.tab.act{color:var(--cb);background:var(--bg)}
.tab.act::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;background:var(--ca)}
.tab .tx{font-size:10px;opacity:.3;cursor:pointer;flex-shrink:0;padding:2px;border-radius:2px}
.tab:hover .tx{opacity:.8;color:var(--rd)}
.tab.mod .tn::after{content:'●';color:var(--yl);font-size:8px;margin-left:3px;vertical-align:middle}
.tab.cmp-tab{color:var(--bl)}
.tab.cmp-tab.act{color:var(--bl)}
.tab.cmp-tab.act::after{background:var(--bl)}
.fmt-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}

/* ── WORKSPACE ── */
#ws{display:grid;grid-template-columns:175px 1fr;overflow:hidden}

/* ── SIDEBAR ── */
#sb{background:var(--s1);border-right:1px solid var(--b0);overflow-y:auto;display:flex;flex-direction:column}
.sb-sect{padding:8px 0}
.sb-hdr{padding:3px 10px;font-size:10px;letter-spacing:.12em;color:var(--mu);text-transform:uppercase;font-family:var(--sans)}
.cat{padding:5px 10px 5px 12px;cursor:pointer;font-size:12px;color:var(--mu);display:flex;align-items:center;gap:7px;transition:.1s;border-left:2px solid transparent;outline:none}
.cat:hover{color:var(--tx);background:var(--s2)}
.cat.act{color:var(--cb);border-left-color:var(--ca);background:rgba(229,121,26,.07)}
.cat i{font-size:14px;flex-shrink:0}
.sb-info{margin-top:auto;padding:10px;border-top:1px solid var(--b0);font-size:11px;color:var(--mu);line-height:2.1;font-family:var(--sans)}
.sb-info b{color:var(--tx);font-weight:400}

/* ── MAIN PANEL ── */
#mp{display:grid;grid-template-rows:36px 1fr;overflow:hidden;background:var(--bg)}

/* ── SEARCH ROW ── */
#sr{display:flex;align-items:center;gap:6px;padding:0 8px;border-bottom:1px solid var(--b0);background:var(--s1)}
.sw{position:relative;flex:1;display:flex;align-items:center}
.sw-ico{position:absolute;left:8px;color:var(--mu);font-size:14px;pointer-events:none}
#sin{flex:1;background:var(--s2);border:1px solid var(--b0);color:var(--tx);padding:4px 26px 4px 28px;border-radius:var(--r);font-family:var(--mono);font-size:12px;outline:none}
#sin:focus{border-color:var(--ca)}
#scl{background:none;border:none;color:var(--mu);cursor:pointer;font-size:16px;position:absolute;right:4px;display:none;line-height:1;padding:0 3px}
#scl:hover{color:var(--tx)}
#sct{font-size:11px;color:var(--mu);white-space:nowrap;min-width:60px;text-align:right}
.row-btns{display:flex;gap:2px}
.sm-btn{padding:3px 7px;border:1px solid var(--b0);background:transparent;color:var(--mu);cursor:pointer;font-size:11px;border-radius:3px;font-family:var(--mono);transition:.1s;display:flex;align-items:center;gap:3px;outline:none}
.sm-btn:hover{color:var(--tx);border-color:var(--b1)}
.sm-btn.act{color:var(--cb);border-color:var(--ca);background:rgba(229,121,26,.1)}
.sm-btn i{font-size:13px}

/* ── VIEW AREA ── */
#va{overflow:auto;padding:4px}

/* ── TREE TOOLBAR ── */
.tree-toolbar{display:flex;gap:4px;padding:4px 6px 2px;border-bottom:1px solid rgba(28,45,66,.5)}
.tt-btn{padding:2px 7px;border:1px solid var(--b0);background:transparent;color:var(--mu);cursor:pointer;font-size:11px;border-radius:3px;font-family:var(--sans);transition:.1s;display:flex;align-items:center;gap:4px}
.tt-btn:hover{color:var(--tx);border-color:var(--b1);background:var(--s2)}
.tt-btn i{font-size:12px}

/* ── QUICK STATS ── */
/* ── QUICK STATS PANEL ── */
.qs-panel{border-bottom:1px solid var(--b0);background:var(--s1)}
.qs-section{display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:6px 10px 4px}
.qs-section+.qs-section{border-top:1px solid rgba(28,45,66,.5);padding-top:5px}
.qs-stitle{font-size:9px;letter-spacing:.14em;color:var(--mu);text-transform:uppercase;
  font-family:var(--sans);padding-right:6px;border-right:1px solid var(--b0);margin-right:2px;
  white-space:nowrap;flex-shrink:0}
.qs-card{background:var(--s2);border:1px solid var(--b0);border-radius:var(--r);padding:4px 9px;
  min-width:72px;flex-shrink:0}
.qs-label{font-size:10px;color:var(--mu);font-family:var(--sans);text-transform:uppercase;
  letter-spacing:.06em;margin-bottom:1px}
.qs-val{font-size:13px;color:var(--cb);font-weight:600;line-height:1.4}
.qs-editable{cursor:text;border-bottom:1px dashed rgba(229,121,26,.4);transition:.1s}
.qs-editable:hover{border-bottom-color:var(--ca);color:var(--ca)}
.qs-edit-inp{background:transparent;border:none;border-bottom:1px solid var(--ca);outline:none;
  font-family:var(--mono);font-size:13px;font-weight:600;width:90px;padding:0;color:var(--ca)}
/* Actor cards */
.qs-actors-row{display:flex;flex-wrap:wrap;gap:6px;padding:6px 10px 6px;
  border-top:1px solid rgba(28,45,66,.5)}
.qs-ac{background:var(--s2);border:1px solid var(--b0);border-radius:var(--r);
  padding:7px 10px;width:168px;flex-shrink:0}
.qs-ac-hdr{display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:5px;gap:6px}
.qs-ac-name{color:var(--cy);font-size:12px;font-family:var(--sans);font-weight:600;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qs-ac-lv{color:var(--mu);font-size:11px;font-family:var(--sans);white-space:nowrap;flex-shrink:0}
.qs-ac-lv .qs-editable{color:var(--mu)}
.qs-ac-stat{display:flex;align-items:baseline;gap:4px;margin-bottom:2px}
.qs-ac-stlbl{font-size:9px;letter-spacing:.08em;color:var(--mu);font-family:var(--sans);
  text-transform:uppercase;width:20px;flex-shrink:0}
.qs-ac-nums{display:flex;align-items:baseline;gap:1px;font-size:12px}
.qs-ac-sep{color:var(--b2);font-size:10px;margin:0 1px}
.qs-bar{height:3px;background:var(--b0);border-radius:2px;margin-bottom:4px;overflow:hidden}
.qs-bar-fill{height:100%;border-radius:2px}
.qs-ac-extra{display:flex;justify-content:space-between;margin-top:3px;
  border-top:1px solid rgba(28,45,66,.7);padding-top:4px;gap:4px;flex-wrap:wrap}
.qs-ac-xitem{font-size:11px}
.qs-ac-xlbl{color:var(--mu);font-family:var(--sans);font-size:9px;letter-spacing:.06em;
  text-transform:uppercase;margin-bottom:1px}
.qs-ac-states{margin-top:4px;border-top:1px solid rgba(28,45,66,.7);padding-top:3px;
  font-size:10px;color:var(--rd);font-family:var(--sans)}

/* ── TREE ── */
.tr-root{padding:2px 4px}
.tr-nd{}
.tr-row{display:flex;align-items:baseline;gap:2px;padding:1px 3px;border-radius:2px;cursor:default;line-height:1.7;min-height:22px;user-select:none}
.tr-row:hover{background:var(--s3)}
.tr-row.dc{background:rgba(255,208,64,.07);border-left:2px solid #e6a817;padding-left:1px}
.tr-row.da{background:rgba(61,207,122,.06);border-left:2px solid var(--gr);padding-left:1px}
.tr-row.dr{background:rgba(255,80,96,.06);border-left:2px solid var(--rd);padding-left:1px}
.tr-tog{width:14px;font-size:9px;color:var(--mu);flex-shrink:0;text-align:center;cursor:pointer;padding-top:1px}
.kn{color:#79c0ff}
.ki{color:#7ee787}
.kc{color:var(--mu);margin:0 2px}
.vs{color:#a5d6ff}
.vn{color:var(--cb)}
.vb{color:#ff9057}
.vnl{color:var(--mu);font-style:italic}
.vm{color:var(--mu);font-size:11px}
.tr-ch{margin-left:14px;border-left:1px solid rgba(28,45,66,.9)}
.tr-ch:hover{border-left-color:var(--b0)}
.tr-nd.cl>.tr-ch{display:none}
.val-edit{background:var(--s2);border:1px solid var(--ca);border-radius:2px;color:var(--cb);padding:0 4px;outline:none;font:inherit;font-size:12px;min-width:60px;max-width:280px;vertical-align:baseline}
.val-chk{accent-color:var(--ca);cursor:pointer;vertical-align:baseline;width:14px;height:14px}
.editable:hover{background:rgba(229,121,26,.1);border-radius:2px;outline:1px dashed rgba(229,121,26,.3);cursor:text}

/* ── COMPARE ── */
.cmp-wrap{display:flex;flex-direction:column;height:100%}
.cmp-filters{display:flex;flex-wrap:wrap;gap:8px;align-items:center;padding:8px 10px;border-bottom:1px solid var(--b0);background:var(--s1)}
.cmp-lbl{font-size:11px;color:var(--mu);font-family:var(--sans);display:flex;align-items:center;gap:4px;cursor:pointer;user-select:none}
.cmp-lbl:hover{color:var(--tx)}
.cmp-lbl input[type=checkbox]{accent-color:var(--ca);cursor:pointer}
.cmp-path{background:var(--s2);border:1px solid var(--b0);color:var(--tx);padding:3px 8px;border-radius:var(--r);font-family:var(--mono);font-size:11px;outline:none;width:160px}
.cmp-path:focus{border-color:var(--ca)}
.cmp-cnt-info{font-size:11px;color:var(--mu);font-family:var(--sans);margin-left:auto}
.cmp-cnt-info b{color:var(--cb)}
.cmp-csv-btn{padding:3px 8px;border:1px solid var(--b0);background:transparent;color:var(--mu);cursor:pointer;font-size:11px;border-radius:3px;font-family:var(--sans);display:flex;align-items:center;gap:4px}
.cmp-csv-btn:hover{color:var(--tx);border-color:var(--b1)}
.cmp-body{overflow:auto;flex:1}
.diff-tbl{width:100%;border-collapse:collapse;font-size:12px}
.diff-tbl th{text-align:left;padding:4px 8px;border-bottom:1px solid var(--b0);color:var(--mu);font-weight:600;position:sticky;top:0;background:var(--bg);font-family:var(--sans);white-space:nowrap;cursor:pointer;user-select:none}
.diff-tbl th:hover{color:var(--tx)}
.diff-tbl th.sort-asc::after{content:' ▲';font-size:9px}
.diff-tbl th.sort-desc::after{content:' ▼';font-size:9px}
.diff-tbl td{padding:2px 8px;border-bottom:1px solid rgba(28,45,66,.5);vertical-align:top}
.diff-tbl tr:hover td{background:var(--s2)}
.td-path{color:var(--bl);font-size:11px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-miss{color:var(--mu);font-style:italic}
.td-delta.pos{color:var(--gr)}
.td-delta.neg{color:var(--rd)}
.group-hdr td{background:var(--s1);color:var(--mu);font-size:11px;padding:3px 8px;font-family:var(--sans);font-weight:600;border-top:1px solid var(--b0)}
.no-diff{color:var(--gr);padding:24px;font-family:var(--sans)}
.no-files{color:var(--mu);padding:24px;font-family:var(--sans)}

/* ── HEX ── */
.hx-view{padding:8px;font-size:11px}
.hx-row{display:flex;gap:20px;padding:1px 0}
.hx-off{color:var(--ca);width:56px;flex-shrink:0}
.hx-byt{color:var(--tx);letter-spacing:1px;min-width:284px}
.hx-asc{color:var(--mu)}
.hx-info{color:var(--mu);font-style:italic;padding:4px 0 10px;font-family:var(--sans)}

/* ── CONTEXT MENU ── */
#ctx{position:fixed;z-index:9999;background:var(--s2);border:1px solid var(--b1);border-radius:var(--r);padding:4px 0;min-width:170px;box-shadow:0 4px 20px rgba(0,0,0,.5);display:none}
.ctx-item{padding:5px 14px;cursor:pointer;font-size:12px;color:var(--tx);display:flex;align-items:center;gap:8px;font-family:var(--sans);transition:.08s}
.ctx-item:hover{background:var(--s3);color:var(--cb)}
.ctx-item i{font-size:14px;color:var(--mu);flex-shrink:0}
.ctx-item:hover i{color:var(--ca)}
.ctx-sep{height:1px;background:var(--b0);margin:3px 0}
.ctx-item.danger{color:var(--rd)}
.ctx-item.danger:hover{background:rgba(255,80,96,.1)}
.ctx-item.danger i{color:var(--rd)}

/* ── TOAST ── */
#toast{position:fixed;bottom:36px;right:16px;background:var(--s2);border:1px solid var(--b1);color:var(--tx);padding:8px 14px;border-radius:var(--r);font-size:12px;font-family:var(--sans);display:none;z-index:9998;transition:opacity .3s}
#toast.show{display:block}

/* ── PASTE MODAL ── */
#paste-modal{position:fixed;inset:0;z-index:9997;background:rgba(7,16,27,.8);display:none;align-items:center;justify-content:center}
#paste-modal.show{display:flex}
.modal-box{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:20px;width:500px;max-width:90vw}
.modal-title{font-size:14px;color:var(--cb);margin-bottom:12px;font-family:var(--sans)}
.modal-ta{width:100%;height:160px;background:var(--s2);border:1px solid var(--b0);color:var(--tx);padding:8px;border-radius:var(--r);font:12px var(--mono);resize:vertical;outline:none}
.modal-ta:focus{border-color:var(--ca)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:10px}

/* ── WELCOME ── */
#wlc{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;gap:16px;padding:20px}
.dz{border:1px dashed var(--b1);border-radius:8px;padding:40px 64px;text-align:center;cursor:pointer;transition:.2s;display:flex;flex-direction:column;align-items:center;gap:10px}
.dz:hover,.dz.ov{border-color:var(--ca);background:rgba(229,121,26,.04)}
.dz-ico{font-size:36px;color:var(--mu)}
.dz:hover .dz-ico{color:var(--ca)}
.dz-t{font-size:14px;color:var(--tx);font-family:var(--sans)}
.dz-s{font-size:12px;color:var(--mu);font-family:var(--sans)}
.fmt-chips{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;margin-top:4px}
.fmt-chip{padding:2px 7px;border:1px solid var(--b1);border-radius:3px;font-size:10px;color:var(--mu);font-family:var(--mono)}
.welcome-tip{font-size:11px;color:var(--mu);font-family:var(--sans);text-align:center}
.welcome-tip kbd{background:var(--s2);border:1px solid var(--b1);border-radius:3px;padding:1px 5px;font-size:11px;color:var(--tx)}

/* ── STATUS ── */
#sta{background:var(--s1);border-top:1px solid var(--b0);display:flex;align-items:center;padding:0 10px;gap:12px;font-size:11px;color:var(--mu);font-family:var(--sans)}
.st-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.st-dot.ok{background:var(--gr)}
.st-dot.w{background:var(--yl)}
.st-sep{color:var(--b1)}

/* ── DROP OVERLAY ── */
#dov{position:fixed;inset:0;z-index:9990;background:rgba(7,16,27,.88);border:3px dashed var(--ca);display:none;align-items:center;justify-content:center;flex-direction:column;gap:10px;color:var(--cb);font-size:16px;pointer-events:none;font-family:var(--sans)}
#dov.show{display:flex}
#dov i{font-size:48px;color:var(--ca)}



/* ── SEARCH MODES (VS Code style) ── */
.srch-modes{display:flex;gap:1px;padding:0 3px;border-right:1px solid var(--b0);margin-right:2px;flex-shrink:0}
.smode{padding:2px 5px;background:transparent;border:1px solid transparent;color:var(--mu);cursor:pointer;
  font-size:11px;border-radius:3px;font-family:var(--mono);font-weight:600;line-height:1.4;transition:.1s;user-select:none}
.smode:hover{color:var(--tx);border-color:var(--b1);background:var(--s3)}
.smode.act{color:var(--cb);border-color:rgba(229,121,26,.5);background:rgba(229,121,26,.15)}
.smode title{display:none}

/* ── COMPARE EDITABLE ── */
.cmp-editable{cursor:text;border-radius:2px}
.cmp-editable:hover{background:rgba(229,121,26,.12);outline:1px dashed rgba(229,121,26,.35)}
.cmp-edit-inp{background:var(--s2);border:1px solid var(--ca);border-radius:2px;color:var(--cb);
  padding:0 4px;outline:none;font:12px var(--mono);width:100%;max-width:180px}

/* ── FIND & REPLACE ── */
#fnr-modal{position:fixed;inset:0;z-index:9997;background:rgba(7,16,27,.8);display:none;align-items:flex-start;justify-content:center;padding-top:80px}
#fnr-modal.show{display:flex}
.fnr-box{background:var(--s1);border:1px solid var(--b1);border-radius:8px;padding:18px;width:460px;max-width:94vw}
.fnr-title{font-size:13px;color:var(--cb);margin-bottom:12px;font-family:var(--sans);display:flex;align-items:center;gap:8px}
.fnr-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.fnr-lbl{font-size:11px;color:var(--mu);width:52px;font-family:var(--sans);flex-shrink:0}
.fnr-inp{flex:1;background:var(--s2);border:1px solid var(--b0);color:var(--tx);padding:5px 8px;border-radius:var(--r);font-family:var(--mono);font-size:12px;outline:none}
.fnr-inp:focus{border-color:var(--ca)}
.fnr-opts{display:flex;gap:10px;margin-bottom:10px}
.fnr-cb{font-size:11px;color:var(--mu);font-family:var(--sans);display:flex;align-items:center;gap:4px;cursor:pointer}
.fnr-cb input{accent-color:var(--ca)}
.fnr-footer{display:flex;gap:8px;justify-content:flex-end;align-items:center}
.fnr-info{font-size:11px;color:var(--mu);font-family:var(--sans);flex:1}
.fnr-info b{color:var(--cb)}

/* ── JUMP TO PATH ── */
#jtp-bar{display:none;position:fixed;top:90px;right:20px;z-index:9996;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:6px 8px;gap:6px;align-items:center;box-shadow:0 4px 16px rgba(0,0,0,.4)}
#jtp-bar.show{display:flex}
#jtp-inp{background:var(--s2);border:1px solid var(--b0);color:var(--tx);padding:4px 8px;border-radius:3px;font-family:var(--mono);font-size:12px;outline:none;width:260px}
#jtp-inp:focus{border-color:var(--ca)}
#jtp-bar button{padding:3px 8px;background:var(--s3);border:1px solid var(--b0);color:var(--mu);cursor:pointer;font-size:11px;border-radius:3px;font-family:var(--sans)}
#jtp-bar button:hover{border-color:var(--ca);color:var(--cb)}

/* ── DIFF BADGE on tree rows ── */
.diff-badge{font-size:9px;padding:1px 4px;border-radius:2px;margin-left:4px;font-family:var(--sans);font-weight:600}
.diff-badge.chg{background:rgba(255,208,64,.2);color:var(--yl);border:1px solid rgba(255,208,64,.3)}
.diff-badge.add{background:rgba(61,207,122,.15);color:var(--gr);border:1px solid rgba(61,207,122,.3)}

/* ── SCROLLBARS ── */


/* ── ES3 UNLOCK PANEL ── */
.es3-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:16px;padding:24px}
.es3-card{background:var(--s2);border:1px solid var(--b1);border-radius:8px;
  padding:24px 28px;width:420px;max-width:94vw;display:flex;flex-direction:column;gap:14px}
.es3-hdr{display:flex;align-items:center;gap:10px;font-family:var(--sans)}
.es3-hdr i{font-size:22px;color:var(--ca)}
.es3-title{font-size:14px;color:var(--tx);font-weight:600}
.es3-sub{font-size:12px;color:var(--mu);font-family:var(--sans);line-height:1.6}
.es3-row{display:flex;gap:8px;align-items:center}
.es3-inp{flex:1;background:var(--bg);border:1px solid var(--b1);color:var(--tx);
  padding:6px 10px;border-radius:var(--r);font-family:var(--mono);font-size:13px;outline:none}
.es3-inp:focus{border-color:var(--ca)}
.es3-status{font-size:11px;font-family:var(--sans);min-height:16px;transition:.2s}
.es3-status.ok{color:var(--gr)}
.es3-status.err{color:var(--rd)}
.es3-status.loading{color:var(--mu)}
.es3-schemes{font-size:11px;color:var(--mu);font-family:var(--sans)}
.es3-schemes summary{cursor:pointer;color:var(--mu)}
.es3-schemes summary:hover{color:var(--tx)}
.es3-schemes ul{margin-top:6px;padding-left:16px;line-height:2}

/* ── LOG VIEWER ── */
.log-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden;font-family:var(--mono);font-size:12px}
.log-toolbar{display:flex;gap:8px;align-items:center;padding:6px 10px;
  border-bottom:1px solid var(--b0);background:var(--s1);flex-shrink:0}
.log-filter{background:var(--s2);border:1px solid var(--b0);color:var(--tx);
  padding:3px 8px;border-radius:var(--r);font-family:var(--mono);font-size:12px;
  outline:none;flex:1}
.log-filter:focus{border-color:var(--ca)}
.log-lvl-btns{display:flex;gap:2px}
.log-lvl{padding:2px 7px;border:1px solid var(--b0);background:transparent;
  cursor:pointer;font-size:11px;border-radius:3px;font-family:var(--sans);transition:.1s}
.log-lvl:hover,.log-lvl.act{color:var(--tx);border-color:var(--b1);background:var(--s2)}
.log-body{overflow:auto;flex:1;padding:4px 0}
.log-line{display:flex;gap:0;padding:1px 0;line-height:1.6}
.log-line:hover{background:var(--s2)}
.log-ln{color:var(--mu);width:44px;text-align:right;padding-right:10px;
  flex-shrink:0;font-size:11px;user-select:none}
.log-txt{flex:1;padding-right:12px;white-space:pre-wrap;word-break:break-all}
.log-line.ll-error .log-txt{color:var(--rd)}
.log-line.ll-warn  .log-txt{color:var(--yl)}
.log-line.ll-debug .log-txt{color:var(--mu)}
.log-line.ll-info  .log-txt{color:var(--tx)}
.log-line.ll-stack .log-txt{color:var(--mu);padding-left:14px;font-size:11px}

/* ── VDF / plain format badge ── */

/* ══ GALLERY ══════════════════════════════════════════════════ */
.gal-wrap{display:flex;flex-direction:column;height:100%;overflow:hidden}
.gal-toolbar{display:flex;gap:8px;align-items:center;padding:7px 10px;
  border-bottom:1px solid var(--b0);background:var(--s1);flex-wrap:wrap;flex-shrink:0}
.gal-key-row{display:flex;align-items:center;gap:6px}
.gal-key-lbl{font-size:11px;color:var(--mu);font-family:var(--sans);white-space:nowrap}
.gal-key-inp{background:var(--s2);border:1px solid var(--b0);color:var(--tx);
  padding:3px 8px;border-radius:var(--r);font-family:var(--mono);font-size:11px;
  outline:none;width:240px;letter-spacing:.04em}
.gal-key-inp:focus{border-color:var(--ca)}
.gal-key-ok{background:rgba(61,207,122,.1);border:1px solid rgba(61,207,122,.3);
  color:var(--gr);padding:2px 7px;border-radius:var(--r);font-size:11px;font-family:var(--sans)}
.gal-count{font-size:11px;color:var(--mu);font-family:var(--sans);white-space:nowrap}
.gal-sel{background:var(--s2);border:1px solid var(--b0);color:var(--tx);
  padding:3px 7px;border-radius:var(--r);font-family:var(--sans);font-size:11px;
  outline:none;cursor:pointer}
.gal-body{overflow:auto;flex:1;padding:10px}
.gal-grid{display:grid;gap:8px}
.gal-grid.gz-xs  {grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}
.gal-grid.gz-s   {grid-template-columns:repeat(auto-fill,minmax(120px,1fr))}
.gal-grid.gz-m   {grid-template-columns:repeat(auto-fill,minmax(170px,1fr))}
.gal-grid.gz-l   {grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
.gal-grid.gz-xl  {grid-template-columns:repeat(auto-fill,minmax(320px,1fr))}
.gal-item{background:var(--s2);border:1px solid var(--b0);border-radius:var(--r);
  overflow:hidden;cursor:pointer;transition:.15s;display:flex;flex-direction:column;
  position:relative}
.gal-item:hover{border-color:var(--ca);transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(0,0,0,.4)}
.gal-item.selected{border-color:var(--ca);outline:2px solid rgba(229,121,26,.4)}
.gal-thumb-wrap{width:100%;aspect-ratio:1;background:repeating-conic-gradient(
  var(--s3) 0% 25%, var(--s2) 0% 50%) 0 0/16px 16px;overflow:hidden;display:flex;
  align-items:center;justify-content:center}
.gal-thumb{width:100%;height:100%;object-fit:contain;display:block}
.gal-info{padding:5px 7px;border-top:1px solid var(--b0);background:rgba(7,16,27,.5)}
.gal-iname{font-size:10px;color:var(--hi);font-family:var(--sans);overflow:hidden;
  text-overflow:ellipsis;white-space:nowrap}
.gal-isize{font-size:9px;color:var(--mu);font-family:var(--sans);margin-top:1px}
.gal-err{font-size:10px;color:var(--rd);font-family:var(--sans);padding:4px}
.gal-loading{display:flex;align-items:center;justify-content:center;height:100%;
  color:var(--mu);font-family:var(--sans);font-size:13px;gap:8px}
.gal-empty{padding:40px;color:var(--mu);font-family:var(--sans);text-align:center;
  line-height:2}
/* Lightbox */
#gal-lb{position:fixed;inset:0;z-index:9995;display:none;
  align-items:center;justify-content:center}
#gal-lb.show{display:flex}
.gal-lb-bg{position:absolute;inset:0;background:rgba(5,10,18,.94);cursor:pointer}
.gal-lb-box{position:relative;z-index:1;background:var(--s1);border:1px solid var(--b1);
  border-radius:8px;padding:14px;max-width:92vw;max-height:93vh;display:flex;
  flex-direction:column;align-items:center;gap:10px;overflow:hidden}
.gal-lb-hdr{display:flex;align-items:center;width:100%;gap:10px}
.gal-lb-fname{font-size:12px;color:var(--tx);font-family:var(--sans);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.gal-lb-close{background:none;border:none;color:var(--mu);cursor:pointer;
  font-size:16px;padding:2px 6px;border-radius:3px;font-family:var(--mono)}
.gal-lb-close:hover{color:var(--rd);background:rgba(255,80,96,.12)}
.gal-lb-imgwrap{flex:1;overflow:hidden;display:flex;align-items:center;
  justify-content:center;background:repeating-conic-gradient(
  var(--s2) 0% 25%, var(--s3) 0% 50%) 0 0/20px 20px;border-radius:4px;
  min-height:200px;min-width:300px}
.gal-lb-img{max-width:85vw;max-height:78vh;object-fit:contain;display:block;
  image-rendering:pixelated}
.gal-lb-img.smooth{image-rendering:auto}
.gal-lb-meta{font-size:11px;color:var(--mu);font-family:var(--sans);
  text-align:center;line-height:1.6}
.gal-lb-foot{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:center}
.gal-nav{position:fixed;top:50%;transform:translateY(-50%);
  background:rgba(12,23,38,.85);border:1px solid var(--b1);color:var(--tx);
  cursor:pointer;font-size:20px;padding:10px 14px;border-radius:var(--r);
  transition:.1s;z-index:9996;user-select:none}
.gal-nav:hover{border-color:var(--ca);color:var(--cb)}
.gal-nav.prev{left:10px}
.gal-nav.next{right:10px}
@keyframes spin{to{transform:rotate(360deg)}}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--s1)}
::-webkit-scrollbar-thumb{background:var(--b1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--b2)}
</style>
</head>
<body>


<!-- FIND & REPLACE MODAL -->
<div id="fnr-modal">
  <div class="fnr-box">
    <div class="fnr-title"><i class="ti ti-replace" style="font-size:16px"></i> Find &amp; Replace</div>
    <div class="fnr-row"><span class="fnr-lbl">Find</span><input class="fnr-inp" id="fnr-find" placeholder="Value to find…"></div>
    <div class="fnr-row"><span class="fnr-lbl">Replace</span><input class="fnr-inp" id="fnr-rep" placeholder="Replace with…"></div>
    <div class="fnr-opts">
      <label class="fnr-cb"><input type="checkbox" id="fnr-regex"> Regex</label>
      <label class="fnr-cb"><input type="checkbox" id="fnr-keys"> Search keys too</label>
      <label class="fnr-cb"><input type="checkbox" id="fnr-nostr"> Numbers/bools only</label>
    </div>
    <div class="fnr-footer">
      <span class="fnr-info" id="fnr-info"></span>
      <button class="hbtn" id="fnr-preview"><i class="ti ti-eye"></i> Preview</button>
      <button class="hbtn p" id="fnr-apply"><i class="ti ti-check"></i> Replace All</button>
      <button class="hbtn" id="fnr-close">Cancel</button>
    </div>
  </div>
</div>

<!-- JUMP TO PATH BAR -->
<div id="jtp-bar">
  <i class="ti ti-arrow-right" style="font-size:13px;color:var(--mu)"></i>
  <input id="jtp-inp" placeholder="Jump to path: system._battleCount">
  <button id="jtp-go">Go</button>
  <button id="jtp-cls">✕</button>
</div>

<div id="gal-lb"><div class="gal-lb-bg"></div></div>
<div id="dov"><i class="ti ti-folder-open"></i><div>Drop files to load</div></div>
<div id="ctx"></div>
<div id="toast"></div>

<!-- PASTE MODAL -->
<div id="paste-modal">
  <div class="modal-box">
    <div class="modal-title">Paste JSON / LZString content</div>
    <textarea class="modal-ta" id="paste-ta" placeholder="Paste raw JSON or LZString-compressed save data here…"></textarea>
    <div class="modal-footer">
      <button class="hbtn" id="paste-cancel">Cancel</button>
      <button class="hbtn p" id="paste-ok"><i class="ti ti-check"></i> Import</button>
    </div>
  </div>
</div>

<div id="app">
  <div id="hdr">
    <div id="logo">SAVE<b>FORGE</b></div>
    <div class="spacer"></div>
    <span class="undo-info" id="undo-info"></span>
    <input type="file" id="fi" multiple accept=".rpgsave,.rmmzsave,.rvdata,.rvdata2,.rvdata3,.rxdata,.json,.nson,.dat,.data,.sav,.save,.es3,.bak,.vdf,.log,.txt,.ini,.cfg,.csv,.conf,.opt,.options,.settings,.prefs,.yml,.yaml,.xml,.gam,.game,.fos,.ess,.sol,.plr,.player,.profile,.world,.wld,.map,.state,.progress,.checkpoint,.slot,.slot0,.slot1,.slot2,.slot3,.quicksave,.autosave,.persist,.persistent,.stats,.record,.replay,.rec,.dem,.demo,.bin,.db,.sqlite,.sqlite3,.srm,.eep,.fla,.mcr,.dsv,.psv,.sps,.pcsav,.chr,.hero,.party,.campaign,.mission,.level,.playerdata,.gamedata,.savegame,.gamesave,.profiledata,.account,.storage,.archive,.bundle,.pack,.pak,.cache,.cloudsave,.nhd,.household,.traveldb" hidden>
    <button class="hbtn" id="fnr-btn" title="Find &amp; Replace (Ctrl+H)"><i class="ti ti-replace"></i></button>

// ═══════════════════════════════════════════════════
// IO HELPERS
// ═══════════════════════════════════════════════════
const readText = f => new Promise((ok,fail)=>{const r=new FileReader();r.onload=e=>ok(e.target.result);r.onerror=fail;r.readAsText(f,'utf-8')});
const readBuf  = f => new Promise((ok,fail)=>{const r=new FileReader();r.onload=e=>ok(e.target.result);r.onerror=fail;r.readAsArrayBuffer(f)});

// ═══════════════════════════════════════════════════
// RUBY MARSHAL PARSER
// ═══════════════════════════════════════════════════
class Marshal {
  constructor(buf){this.b=new Uint8Array(buf);this.p=2;this.sym=[];this.obj=[]}
  byte(){return this.b[this.p++]}
  int(){
    const b=this.byte();
    if(b===0)return 0;
    if(b>=5&&b<=127)return b-5;
    if(b>=128&&b<=251)return b-256+5;
    if(b===1)return this.byte();
    if(b===2)return this.byte()+this.byte()*256;
    if(b===3)return this.byte()+this.byte()*256+this.byte()*65536;
    if(b===4)return this.byte()+this.byte()*256+this.byte()*65536+this.byte()*16777216;
    if(b===252)return this.byte()-256;
    if(b===253)return this.byte()+this.byte()*256-65536;
    if(b===254)return this.byte()+this.byte()*256+this.byte()*65536-16777216;
    if(b===255){const v=this.byte()+this.byte()*256+this.byte()*65536+this.byte()*16777216;return v|0}
    return 0
  }
  str(n){const s=this.b.slice(this.p,this.p+n);this.p+=n;try{return new TextDecoder('utf-8',{fatal:false}).decode(s)}catch{return[...s].map(x=>String.fromCharCode(x)).join('')}}
  read(){
    const t=String.fromCharCode(this.byte());
    switch(t){
      case '0':return null;case 'T':return true;case 'F':return false;
      case 'i':return this.int();
      case 'f':return parseFloat(this.str(this.int()));
      case '"':return this.str(this.int());
      case ':':{const s=this.str(this.int());this.sym.push(s);return s}
      case ';':return this.sym[this.int()];
      case '[':{const n=this.int(),a=[];this.obj.push(a);for(let i=0;i<n;i++)a.push(this.read());return a}
      case '{':{const n=this.int(),o={};this.obj.push(o);for(let i=0;i<n;i++){const k=this.read();o[k]=this.read()}return o}
      case '}':{const n=this.int(),o={};this.obj.push(o);for(let i=0;i<n;i++){const k=this.read();o[k]=this.read()}o['__default']=this.read();return o}
      case 'o':{const cls=this.read(),n=this.int(),o={'@class':cls};this.obj.push(o);for(let i=0;i<n;i++){const k=this.read();o[k]=this.read()}return o}
      case '@':return this.obj[this.int()];
      case 'I':{const v=this.read(),n=this.int();for(let i=0;i<n;i++){this.read();this.read()}return v}
      case 'e':{this.read();return this.read()}
      case 'C':{this.read();return this.read()}
      case 'u':{const cls=this.read(),n=this.int(),d=this.str(n);return{'@class':cls+'(user)','@data':d.substring(0,80)}}
      case 'U':{const cls=this.read(),d=this.read();return{'@class':cls,'@data':d}}
      case 'l':{const sign=this.byte()===43?1n:-1n,n=this.int();let v=0n;for(let i=0;i<n*2;i++)v+=BigInt(this.byte())<<BigInt(8*i);return Number(v*sign)}
      default:throw new Error('Marshal type: '+t+' at '+(this.p-1))
    }
  }
}

// ═══════════════════════════════════════════════════
// CORE UTILITIES
// ═══════════════════════════════════════════════════
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function setPath(obj,path,val){
  if(!path)return;
  const parts=[];let cur='';
  for(const c of path){if(c==='.'){if(cur)parts.push(cur);cur=''}else cur+=c}
  if(cur)parts.push(cur);
  let o=obj;
  for(let i=0;i<parts.length-1;i++){if(!o||typeof o!=='object')return;o=o[parts[i]]}
  if(o&&typeof o==='object')o[parts[parts.length-1]]=val;
}

function getPath(obj,path){
  if(!path)return obj;
  const parts=[];let cur='';
  for(const c of path){if(c==='.'){if(cur)parts.push(cur);cur=''}else cur+=c}
  if(cur)parts.push(cur);
  let o=obj;
  for(const p of parts){if(o===null||o===undefined)return undefined;o=o[p]}
  return o;
}

// ═══════════════════════════════════════════════════
// UNDO / REDO
// ═══════════════════════════════════════════════════
function pushUndo(file,path,oldVal,newVal){
  if(!file.undoStack)file.undoStack=[];
  if(!file.redoStack)file.redoStack=[];
  file.undoStack.push({path,oldVal,newVal});
  file.redoStack=[];
  if(file.undoStack.length>100)file.undoStack.shift();
}
function doUndo(file){
  if(!file.undoStack||!file.undoStack.length)return;
  const e=file.undoStack.pop();
  if(!file.redoStack)file.redoStack=[];
  file.redoStack.push(e);
  if(e.oldVal==='__DELETED__'){
    // can't restore deleted key simply — skip
  } else {
    setPath(file.data,e.path,e.oldVal);
  }
  file.modified=true;
  renderContent();updateTabs();updateStatus();updateUndoBtns();
}
function doRedo(file){
  if(!file.redoStack||!file.redoStack.length)return;
  const e=file.redoStack.pop();
  if(!file.undoStack)file.undoStack=[];
  file.undoStack.push(e);
  if(e.newVal!=='__DELETED__')setPath(file.data,e.path,e.newVal);
  file.modified=true;
  renderContent();updateTabs();updateStatus();updateUndoBtns();
}
function updateUndoBtns(){
  const af=App.files.find(f=>f.id===App.tab);
  document.getElementById('undo-btn').disabled=!af||!af.undoStack||!af.undoStack.length;
  document.getElementById('redo-btn').disabled=!af||!af.redoStack||!af.redoStack.length;
  const info=document.getElementById('undo-info');
  if(info)info.textContent=af&&af.undoStack&&af.undoStack.length?`${af.undoStack.length} edit${af.undoStack.length!==1?'s':''}`:'' ;
}

// ═══════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════
let _toastTimer=null;
function toast(msg,dur=2200){
  const el=document.getElementById('toast');if(!el)return;
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_toastTimer);_toastTimer=setTimeout(()=>el.classList.remove('show'),dur);
}
function copyToClipboard(text){
  navigator.clipboard.writeText(text).then(()=>toast('Copied')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;
    document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('Copied');
  });
}

// ═══════════════════════════════════════════════════
// CONTEXT MENU
// ═══════════════════════════════════════════════════
function showCtx(x,y,items){
  const el=document.getElementById('ctx');el.innerHTML='';
  for(const item of items){
    if(item==='sep'){const s=document.createElement('div');s.className='ctx-sep';el.appendChild(s);continue}
    const d=document.createElement('div');d.className='ctx-item'+(item.danger?' danger':'');
    d.innerHTML=`<i class="ti ${item.icon}"></i>${esc(item.label)}`;
    d.addEventListener('click',()=>{hideCtx();item.action()});
    el.appendChild(d);
  }
  el.style.display='block';
  const r=el.getBoundingClientRect();const W=window.innerWidth,H=window.innerHeight;
  el.style.left=(x+r.width>W?W-r.width-4:x)+'px';
  el.style.top=(y+r.height>H?H-r.height-4:y)+'px';
}
function hideCtx(){const el=document.getElementById('ctx');if(el)el.style.display='none'}
document.addEventListener('click',hideCtx);

function treeContextMenu(e,path,value,fileId){
  e.preventDefault();e.stopPropagation();
  const af=App.files.find(f=>f.id===fileId);
  const items=[
    {icon:'ti-copy',label:'Copy path',action:()=>copyToClipboard(path)},
    {icon:'ti-clipboard-text',label:'Copy value (JSON)',action:()=>copyToClipboard(JSON.stringify(value))},
  ];
  if(typeof value==='object'&&value!==null)
    items.push({icon:'ti-braces',label:'Copy subtree JSON',action:()=>copyToClipboard(JSON.stringify(value,null,2))});
  if(af&&af.encoder){
    items.push('sep');
    if(typeof value==='number'){
      items.push({icon:'ti-plus',label:'Increment +1',action:()=>{const o=getPath(af.data,path);const n=(o||0)+1;pushUndo(af,path,o,n);setPath(af.data,path,n);af.modified=true;renderContent();updateTabs();updateStatus();updateUndoBtns()}});
      items.push({icon:'ti-minus',label:'Decrement −1',action:()=>{const o=getPath(af.data,path);const n=(o||0)-1;pushUndo(af,path,o,n);setPath(af.data,path,n);af.modified=true;renderContent();updateTabs();updateStatus();updateUndoBtns()}});
    }
    if(typeof value==='object'&&value!==null)
      items.push({icon:'ti-square-plus',label:Array.isArray(value)?'Add item':'Add key…',action:()=>addKey(fileId,path,Array.isArray(value))});
    items.push({icon:'ti-eraser',label:'Set to null',action:()=>{const o=getPath(af.data,path);pushUndo(af,path,o,null);setPath(af.data,path,null);af.modified=true;renderContent();updateTabs();updateStatus();updateUndoBtns()},danger:true});
    items.push({icon:'ti-trash',label:'Delete key',action:()=>deleteKey(fileId,path),danger:true});
  }
  showCtx(e.clientX,e.clientY,items);
}

// ═══════════════════════════════════════════════════
// TREE VALUE ELEMENTS
// ═══════════════════════════════════════════════════
function makeValEl(val){
  const s=document.createElement('span');
  if(val===null||val===undefined){s.className='vnl';s.textContent='null'}
  else if(typeof val==='boolean'){s.className='vb';s.textContent=String(val)}
  else if(typeof val==='number'){s.className='vn';s.textContent=String(val)}
  else if(typeof val==='string'){
    s.className='vs';
    const p=val.length>120?val.substring(0,120)+`…+${val.length-120}`:val;
    s.textContent='"'+p+'"';
    if(val.length>120)s.title=val.substring(0,500);
  }
  return s;
}

function makeEditableVal(val,path,fileId){
  const af=App.files.find(f=>f.id===fileId);
  if(!af||!af.encoder)return makeValEl(val);
  if(typeof val==='boolean'){
    const wrap=document.createElement('span');
    const chk=document.createElement('input');chk.type='checkbox';chk.className='val-chk';chk.checked=val;
    chk.addEventListener('click',e=>{e.stopPropagation();
      pushUndo(af,path,val,chk.checked);setPath(af.data,path,chk.checked);
      af.modified=true;updateTabs();updateStatus();updateUndoBtns();
    });
    const lbl=document.createElement('span');lbl.className='vb';lbl.textContent=String(val);lbl.style.marginLeft='4px';
    chk.addEventListener('change',()=>{lbl.textContent=String(chk.checked)});
    wrap.appendChild(chk);wrap.appendChild(lbl);return wrap;
  }
  const el=makeValEl(val);
  el.classList.add('editable');
  el.addEventListener('click',e=>{e.stopPropagation();startEdit(el,path,val,fileId)});
  return el;
}

function startEdit(el,path,curVal,fileId,onCommit=null){
  const af=App.files.find(f=>f.id===fileId);if(!af)return;
  const inp=document.createElement('input');
  inp.type='text';inp.className='val-edit';
  inp.value=curVal===null?'null':String(curVal);
  el.replaceWith(inp);inp.focus();inp.select();
  const commit=()=>{
    const raw=inp.value.trim();
    let nv;
    if(raw==='null')nv=null;
    else if(raw==='true')nv=true;
    else if(raw==='false')nv=false;
    else if(raw!==''&&!isNaN(raw))nv=Number(raw);
    else nv=inp.value;
    if(JSON.stringify(nv)===JSON.stringify(curVal)){
      inp.replaceWith(makeEditableVal(curVal,path,fileId));
      if(onCommit)onCommit(false);return;
    }
    pushUndo(af,path,curVal,nv);setPath(af.data,path,nv);af.modified=true;
    inp.replaceWith(makeEditableVal(nv,path,fileId));
    updateTabs();updateStatus();updateUndoBtns();
    if(onCommit)onCommit(true);
  };
  inp.addEventListener('blur',commit);
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){e.preventDefault();inp.blur()}
    if(e.key==='Escape')inp.replaceWith(makeEditableVal(curVal,path,fileId));
  });
}

// ═══════════════════════════════════════════════════
// TREE RENDERER (lazy expand)
// ═══════════════════════════════════════════════════
function renderChildren(data,path,container,depth,fileId){
  const isArr=Array.isArray(data);
  const entries=isArr?data.map((v,i)=>[String(i),v]):Object.entries(data);
  const max=Math.min(entries.length,600);
  for(let i=0;i<max;i++){
    const[k,v]=entries[i];
    container.appendChild(makeNode(k,v,path?path+'.'+k:k,depth,fileId,isArr));
  }
  if(entries.length>600){
    const m=document.createElement('div');m.className='tr-row';
    m.innerHTML=`<span class="tr-tog"></span><span class="vm">… ${entries.length-600} more (use search)</span>`;
    container.appendChild(m);
  }
}

function makeNode(key,value,path,depth,fileId,isIdx){
  const nd=document.createElement('div');nd.className='tr-nd';
  const row=document.createElement('div');row.className='tr-row';
  const tog=document.createElement('span');tog.className='tr-tog';
  const keyEl=document.createElement('span');keyEl.className=isIdx?'ki':'kn';keyEl.textContent=key;
  const colon=document.createElement('span');colon.className='kc';colon.textContent=':';
  row.appendChild(tog);row.appendChild(keyEl);row.appendChild(colon);
  const isObj=typeof value==='object'&&value!==null;
  if(isObj){
    const size=Array.isArray(value)?value.length:Object.keys(value).length;
    const meta=document.createElement('span');meta.className='vm';
    meta.textContent=` ${Array.isArray(value)?'['+size+']':'{'+size+'}'}`;
    row.appendChild(meta);
    const startClosed=depth>=2||size>50;
    tog.textContent=startClosed?'▶':'▼';
    if(startClosed)nd.classList.add('cl');
    const ch=document.createElement('div');ch.className='tr-ch';
    let loaded=!startClosed;
    if(!startClosed)renderChildren(value,path,ch,depth+1,fileId);
    const toggle=()=>{const closed=nd.classList.toggle('cl');tog.textContent=closed?'▶':'▼';if(!closed&&!loaded){renderChildren(value,path,ch,depth+1,fileId);loaded=true}};
    tog.addEventListener('click',e=>{e.stopPropagation();toggle()});
    row.addEventListener('click',e=>{if(e.target!==tog)toggle()});
    row.addEventListener('contextmenu',e=>treeContextMenu(e,path,value,fileId));
    nd.appendChild(row);nd.appendChild(ch);
  } else {
    tog.textContent=' ';
    row.appendChild(makeEditableVal(value,path,fileId));
    row.addEventListener('contextmenu',e=>treeContextMenu(e,path,value,fileId));
    nd.appendChild(row);
  }
  return nd;
}

function buildTree(data,fileId){
  const root=document.createElement('div');root.className='tr-root';
  if(data===null||data===undefined||typeof data!=='object'){const r=document.createElement('div');r.className='tr-row';r.appendChild(makeValEl(data));root.appendChild(r);return root}
  renderChildren(data,'',root,0,fileId);return root;
}

function buildFlatView(data,fileId){
  const root=document.createElement('div');root.className='tr-root';
  const results=[];
  (function flat(obj,path,depth){
    if(depth>15)return;
    if(typeof obj!=='object'||obj===null){results.push({path,value:obj});return}
    const entries=Array.isArray(obj)?obj.map((v,i)=>[String(i),v]):Object.entries(obj);
    for(const[k,v]of entries.slice(0,1000))flat(v,path?path+'.'+k:k,depth+1);
  })(data,'',0);
  for(const r of results.slice(0,2000)){
    const row=document.createElement('div');row.className='tr-row';
    const tog=document.createElement('span');tog.className='tr-tog';tog.textContent=' ';
    const pe=document.createElement('span');pe.className='kn';pe.textContent=r.path;
    const colon=document.createElement('span');colon.className='kc';colon.textContent=':';
    row.appendChild(tog);row.appendChild(pe);row.appendChild(colon);
    row.appendChild(makeEditableVal(r.value,r.path,fileId));
    row.addEventListener('contextmenu',e=>treeContextMenu(e,r.path,r.value,fileId));
    root.appendChild(row);
  }
  return root;
}

function expandAll(container){container.querySelectorAll('.tr-nd.cl').forEach(nd=>{nd.classList.remove('cl');const t=nd.querySelector(':scope>.tr-row>.tr-tog');if(t)t.textContent='▼'})}
function collapseAll(container){container.querySelectorAll('.tr-nd:not(.cl)').forEach(nd=>{nd.classList.add('cl');const t=nd.querySelector(':scope>.tr-row>.tr-tog');if(t)t.textContent='▶'})}

// ═══════════════════════════════════════════════════
// CATEGORY DETECTION
// ═══════════════════════════════════════════════════
const CATS_MZ=[
  {id:'all',    label:'All',       icon:'ti-circle-dot'},
  {id:'system', label:'System',    icon:'ti-settings',      keys:['system']},
  {id:'party',  label:'Party',     icon:'ti-users',         keys:['party']},
  {id:'actors', label:'Actors',    icon:'ti-sword',         keys:['actors']},
  {id:'vars',   label:'Variables', icon:'ti-variable',      keys:['variables']},
  {id:'sw',     label:'Switches',  icon:'ti-toggle-left',   keys:['switches','selfSwitches']},
  {id:'map',    label:'Map',       icon:'ti-map-2',         keys:['map']},
  {id:'player', label:'Player',    icon:'ti-device-gamepad',keys:['player']},
  {id:'screen', label:'Screen',    icon:'ti-device-desktop',keys:['screen']},
  {id:'timer',  label:'Timer',     icon:'ti-clock',         keys:['timer']},
];
const CATS_GEN=[{id:'all',label:'All',icon:'ti-circle-dot',keys:null}];

function detectCats(data){
  if(!data||typeof data!=='object')return CATS_GEN;
  const ks=Object.keys(data);
  if(['system','actors','party','map','variables','switches'].some(k=>ks.includes(k)))return CATS_MZ;
  return CATS_GEN;
}
function filterByCat(data,catId,cats){
  if(!catId||catId==='all')return data;
  const cat=cats.find(c=>c.id===catId);
  if(!cat||!cat.keys)return data;
  const out={};for(const k of cat.keys)if(k in data)out[k]=data[k];
  return Object.keys(out).length?out:data;
}

async function parseContent(text, buf) {
  const t = (text||'').trim();
  if (t) {
    try{const d=JSON.parse(t);return{format:'json',data:d,encoder:d=>JSON.stringify(d,null,2)}}catch{}
    if(typeof LZString!=='undefined'){
      try{const dc=LZString.decompressFromBase64(t);if(dc&&dc.length>2){const d=JSON.parse(dc);return{format:'lzstring',data:d,encoder:d=>LZString.compressToBase64(JSON.stringify(d))}}}catch{}
    }
    try{const dc=atob(t);const d=JSON.parse(dc);return{format:'b64json',data:d,encoder:d=>btoa(JSON.stringify(d))}}catch{}
  }
  if (buf) {
    const bytes=new Uint8Array(buf);
    if(bytes.length>=2&&bytes[0]===0x04&&bytes[1]===0x08){
      try{const m=new Marshal(buf);return{format:'marshal',data:m.read(),encoder:null,raw:buf}}
      catch(e){return{format:'error',data:{_error:e.message},encoder:null,raw:buf}}
    }
    return{format:'binary',data:bytes,encoder:null,raw:buf};
  }
  return{format:'error',data:{_error:'Unknown format'},encoder:null};
}

// VDF serializer
function vdfStringify(obj, indent=0) {
  const tab='\t'.repeat(indent); let out='';
  for(const[k,v]of Object.entries(obj)){
    if(typeof v==='object'&&v!==null){
      out+=tab+JSON.stringify(k)+'\n'+tab+'{\n';
      out+=vdfStringify(v,indent+1);
      out+=tab+'}\n';
    } else {
      out+=tab+JSON.stringify(k)+'\t\t'+JSON.stringify(String(v))+'\n';
    }
  }
  return out;
}

// ═══════════════════════════════════════════════════
// parseFile — extension-aware router
// ═══════════════════════════════════════════════════
async function parseFile(file) {
  const ext=file.name.split('.').pop().toLowerCase();
  let text='', buf=null;
  try{text=await readText(file)}catch{}
  try{buf=await readBuf(file)}catch{}
  const t=(text||'').trim();

  // ── RMMZSAVE: UTF-8 encoded zlib-compressed JSON (RPG Maker MZ desktop) ──
  if(ext==='rmmzsave'){
    // Try LZString first (RPG Maker web/MV style)
    if(typeof LZString!=='undefined'){
      try{const dc=LZString.decompressFromBase64(t);if(dc&&dc.length>2){const d=JSON.parse(dc);return{format:'lzstring',data:d,encoder:d=>LZString.compressToBase64(JSON.stringify(d)),raw:text,buf}}}catch{}
    }
    // Try plain JSON
    try{const d=JSON.parse(t);return{format:'json',data:d,encoder:d=>JSON.stringify(d,null,2),raw:text,buf}}catch{}
    // RMMZSAVE: bytes were stored as a binary string then UTF-8 encoded on disk
    if(buf&&typeof pako!=='undefined'){
      try{
        const textDec=new TextDecoder('utf-8').decode(buf);
        const recovered=new Uint8Array(textDec.length);
        for(let i=0;i<textDec.length;i++)recovered[i]=textDec.charCodeAt(i);
        const dec=pako.inflate(recovered);
        const json=new TextDecoder('utf-8').decode(dec);
        const d=JSON.parse(json);
        const encoder=d=>{
          const jb=new TextEncoder().encode(JSON.stringify(d));
          const comp=pako.deflate(jb,{level:1});
          let s=''; for(let i=0;i<comp.length;i+=8192)s+=String.fromCharCode(...comp.slice(i,i+8192));
          return s;
        };
        return{format:'rmmzsave',data:d,encoder,raw:text,buf};
      }catch(e){}
    }
  }

  // ── RPGSAVE: LZString or JSON (RPG Maker MV/MZ) ──
  if(ext==='rpgsave'||ext==='save'){
    if(typeof LZString!=='undefined'){
      try{const dc=LZString.decompressFromBase64(t);if(dc&&dc.length>2){const d=JSON.parse(dc);return{format:'lzstring',data:d,encoder:d=>LZString.compressToBase64(JSON.stringify(d)),raw:text,buf}}}catch{}
    }
    try{const d=JSON.parse(t);return{format:'json',data:d,encoder:d=>JSON.stringify(d,null,2),raw:text,buf}}catch{}
  }

  // ── ES3 / BAK: AES-encrypted Unity save ──
  if(ext==='es3'||ext==='bak'){
    try{const d=JSON.parse(t);return{format:'json',data:d,encoder:d=>JSON.stringify(d,null,2),raw:text,buf}}catch{}
    return{format:'es3',data:{_encrypted:true,_file:file.name,_size:file.size},encoder:null,raw:text,buf};
  }

  // ── VDF: Valve Data Format ──
  if(ext==='vdf'){
    try{const d=parseVDF(text);return{format:'vdf',data:d,encoder:d=>vdfStringify(d),raw:text}}catch{}
  }

  // ── LOG / TEXT ──
  if(['log','txt','ini','cfg','csv'].includes(ext)){
    return{format:'log',data:text,encoder:null,raw:text};
  }

  // ── Fallback: generic content detection ──
  const r=await parseContent(text,buf);
  r.raw=r.raw||text; r.buf=r.buf||buf;
  return r;
}

// ── YAML ──────────────────────────────────────────
function parseYAMLVal(s){
  s=s.trim();
  if(!s||s==='null'||s==='~')return null;
  if(s==='true'||s==='yes'||s==='on')return true;
  if(s==='false'||s==='no'||s==='off')return false;
  if(!isNaN(s)&&s!=='')return Number(s);
  if((s.startsWith('"')&&s.endsWith('"'))||(s.startsWith("'")&&s.endsWith("'")))return s.slice(1,-1);
  return s;
}
function parseYAML(text){
  const lines=text.split('\n');
  const root={};
  // Stack: {indent, obj, key, isArr}
  const stk=[{indent:-1,obj:root,key:null,isArr:false}];
  function top(){return stk[stk.length-1]}
  function popTo(indent){while(stk.length>1&&top().indent>=indent)stk.pop()}
  function setVal(key,val,obj){
    if(Array.isArray(obj))obj.push(val);
    else obj[key]=val;
  }
  for(const raw of lines){
    if(!raw.trim()||raw.trim().startsWith('#'))continue;
    const indent=raw.search(/\S/);
    const line=raw.trim();
    popTo(indent);
    const {obj,key}=top();
    const target=Array.isArray(obj)?obj:obj;
    if(line.startsWith('- ')){
      const val=line.slice(2).trim();
      const cur=key!==null&&!Array.isArray(target[key])?target[key]=[]:key!==null?target[key]:target;
      if(val.includes(':')&&!val.startsWith('"')&&!val.startsWith("'")){
        const newObj={};cur.push(newObj);stk.push({indent,obj:newObj,key:null,isArr:true});
        const ci=val.indexOf(':');const k=val.slice(0,ci).trim();const v=val.slice(ci+1).trim();
        if(v)newObj[k]=parseYAMLVal(v);else{newObj[k]={};stk.push({indent:indent+2,obj:newObj,key:k,isArr:false})}
      }else cur.push(parseYAMLVal(val));
    }else if(line.includes(':')){
      const ci=line.indexOf(':');const k=line.slice(0,ci).trim().replace(/^["']|["']$/g,'');
      const v=line.slice(ci+1).trim();
      const t2=Array.isArray(target)?{}:target;
      if(Array.isArray(target))target.push(t2);
      if(!v||v==='|'||v==='>'){t2[k]={};stk.push({indent,obj:t2,key:k,isArr:false})}
      else if(v.startsWith('[')){try{t2[k]=JSON.parse(v.replace(/'/g,'"'))}catch{t2[k]=v};stk.push({indent,obj:t2,key:k,isArr:false})}
      else{t2[k]=parseYAMLVal(v);stk.push({indent,obj:t2,key:k,isArr:false})}
    }
  }
  return root;
}
function yamlStringify(obj,indent=0){
  if(obj===null)return'null';
  if(typeof obj==='boolean'||typeof obj==='number')return String(obj);
  if(typeof obj==='string'){
    if(/[\n:#\[\]{},]/.test(obj)||!obj.trim())return JSON.stringify(obj);
    return obj;
  }
  const pad='  '.repeat(indent);
  if(Array.isArray(obj))return obj.map(v=>{
    const vs=yamlStringify(v,indent+1);
    return typeof v==='object'&&v?pad+'- \n'+vs.split('\n').map(l=>pad+'  '+l).join('\n'):pad+'- '+vs;
  }).join('\n');
  return Object.entries(obj).map(([k,v])=>{
    if(typeof v==='object'&&v!==null){
      if(Array.isArray(v)&&!v.length)return pad+k+': []';
      return pad+k+':\n'+yamlStringify(v,indent+1);
    }
    return pad+k+': '+yamlStringify(v);
  }).join('\n');
}

// ── INI / CONFIG ──────────────────────────────────
function parseINI(text){
  const result={};let cur=result;
  for(const raw of text.split('\n')){
    const line=raw.trim();
    if(!line||line.startsWith('#')||line.startsWith(';')||line.startsWith('//'))continue;
    if(line.startsWith('[')&&line.includes(']')){
      const sec=line.slice(1,line.indexOf(']'));result[sec]={};cur=result[sec];
    }else{
      const si=line.includes('=')?line.indexOf('='):line.includes(':')?line.indexOf(':'):-1;
      if(si<0)continue;
      const k=line.slice(0,si).trim();
      const v=line.slice(si+1).split(/\s*[#;]/)[0].trim().replace(/^["']|["']$/g,'');
      cur[k]=v==='null'?null:v==='true'||v==='yes'?true:v==='false'||v==='no'?false:(!isNaN(v)&&v!=='')?Number(v):v;
    }
  }
  const keys=Object.keys(result);
  if(keys.length===1&&typeof result[keys[0]]==='object')return result[keys[0]];
  return result;
}
function iniStringify(obj){
  let out='';const secs={};const root={};
  for(const[k,v]of Object.entries(obj)){if(typeof v==='object'&&v)secs[k]=v;else root[k]=v}
  for(const[k,v]of Object.entries(root))out+=`${k}=${v}\n`;
  for(const[s,vals]of Object.entries(secs)){
    out+=`\n[${s}]\n`;
    for(const[k,v]of Object.entries(vals))out+=`${k}=${v}\n`;
  }
  return out;
}

// ── XML ───────────────────────────────────────────
function parseXML(text){
  const doc=new DOMParser().parseFromString(text,'text/xml');
  const err=doc.querySelector('parsererror');
  if(err)throw new Error(err.textContent.substring(0,120));
  function n2o(node){
    const obj={};
    if(node.attributes)for(const a of node.attributes)obj['@'+a.name]=a.value;
    const kids=Array.from(node.childNodes);
    const els=kids.filter(n=>n.nodeType===1);
    const txt=kids.filter(n=>n.nodeType===3).map(n=>n.textContent.trim()).join('').trim();
    if(!els.length){if(!Object.keys(obj).length)return txt||null;if(txt)obj['#text']=txt;return obj}
    if(txt)obj['#text']=txt;
    for(const c of els){
      const nm=c.tagName||c.localName;const val=n2o(c);
      if(nm in obj){if(!Array.isArray(obj[nm]))obj[nm]=[obj[nm]];obj[nm].push(val)}
      else obj[nm]=val;
    }
    return obj;
  }
  const r=doc.documentElement;return{[r.tagName]:n2o(r)};
}

// ── SQLITE ────────────────────────────────────────
const SQLITE_MAGIC=[83,81,76,105,116,101,32,102,111,114,109,97,116,32,51,0];
function isSQLite(b){return b.length>=16&&SQLITE_MAGIC.every((v,i)=>b[i]===v)}
function parseSQLiteHeader(b){
  const v=new DataView(b.buffer||new Uint8Array(b).buffer);
  const pg=v.getUint16(16,false);
  return{_format:'SQLite Database',_pageSize:pg===1?65536:pg,_pageCount:v.getUint32(28,false),
    _fileSize:b.length,_encoding:b[56]===1?'UTF-8':b[56]===2?'UTF-16LE':'UTF-16BE',
    _note:'Use DB Browser for SQLite to inspect tables and rows.'};
}

// ── PSX MEMORY CARD ───────────────────────────────
function parsePSXMemCard(b){
  const r={_format:'PSX Memory Card (128 KB)',_note:'15 save blocks of 8 KB each',blocks:[]};
  for(let i=0;i<15;i++){
    const h=128+i*128;const s=b[h];
    const stateMap={0x51:'in_use (first)',0x52:'in_use (middle)',0x53:'in_use (last)',0xA0:'free',0xFF:'corrupted'};
    r.blocks.push({block:i+1,state:stateMap[s]||`unknown(0x${s.toString(16)})`});
  }
  return r;
}

// ── SNES SRAM / EEPROM ────────────────────────────
function parseSRAMInfo(bytes,ext){
  const types={srm:'SNES SRAM',eep:'N64 EEPROM (512B/2KB)',fla:'N64 FlashRAM (128KB)',
    dsv:'NDS Save',psv:'PS Vita Save',mcr:'PSX Memory Card',sps:'Spectrum Save'};
  return{_format:types[ext]||'Console Save RAM',_size:bytes.length,_sizeKB:(bytes.length/1024).toFixed(2),
    _note:'Raw binary save data — structure is game-specific.',
    _first32bytes:Array.from(bytes.slice(0,32)).map(b=>b.toString(16).padStart(2,'0')).join(' ')};
}

// ── GENERIC SAVE CHAIN ────────────────────────────
const GENERIC_EXTS=new Set([
  'gam','game','savegame','gamesave','gamedata','playerdata','profiledata',
  'slot','slot0','slot1','slot2','slot3','quicksave','autosave',
  'fos','plr','player','profile','account','chr','hero',
  'campaign','mission','level','state','progress','checkpoint',
  'persist','persistent','storage','cache','cloudsave',
  'stats','record','replay','rec','dem','demo','world','wld','map',
  'pack','bundle','archive','sps','pcsav','nhd','household','traveldb',
  'rvdata3','sol','ess','savegame','pak','bin'
]);
const CONSOLE_EXTS=new Set(['srm','eep','fla','mcr','dsv','psv','sps']);

async function tryGenericChain(text,buf,ext){
  const t=(text||'').trim();
  if(t){
    try{const d=JSON.parse(t);return{format:'json',data:d,encoder:d=>JSON.stringify(d,null,2),raw:text,buf}}catch{}
    if(typeof LZString!=='undefined'){
      try{const dc=LZString.decompressFromBase64(t);if(dc&&dc.length>2){const d=JSON.parse(dc);return{format:'lzstring',data:d,encoder:d=>LZString.compressToBase64(JSON.stringify(d)),raw:text,buf}}}catch{}
    }
    try{const dc=atob(t);const d=JSON.parse(dc);return{format:'b64json',data:d,encoder:d=>btoa(JSON.stringify(d)),raw:text}}catch{}
    try{const d=parseYAML(text);const k=Object.keys(d||{});if(k.length>0&&k[0]!=='_root')return{format:'yaml',data:d,encoder:d=>yamlStringify(d),raw:text}}catch{}
    try{const d=parseXML(text);return{format:'xml',data:d,encoder:null,raw:text}}catch{}
    try{const d=parseINI(text);if(d&&Object.keys(d).length>0)return{format:'ini',data:d,encoder:d=>iniStringify(d),raw:text}}catch{}
    // Plain readable text
    if([...text].slice(0,200).filter(c=>c.charCodeAt(0)>31||c==='\n'||c==='\r'||c==='\t').length>150){
      return{format:'log',data:text,encoder:null,raw:text};
    }
  }
  if(buf){
    const bytes=new Uint8Array(buf);
    if(isSQLite(bytes))return{format:'sqlite',data:parseSQLiteHeader(bytes),encoder:null,raw:text,buf};
    if(bytes[0]===0x04&&bytes[1]===0x08){
      try{const m=new Marshal(buf);return{format:'marshal',data:m.read(),encoder:null,raw:text,buf}}catch{}
    }
    if(bytes[0]===0x4D&&bytes[1]===0x43&&bytes.length===131072)
      return{format:'json',data:parsePSXMemCard(bytes),encoder:null,raw:text,buf};
    if(typeof pako!=='undefined'){
      try{const dec=pako.inflate(bytes);const s=new TextDecoder('utf-8').decode(dec);const d=JSON.parse(s);return{format:'json',data:d,encoder:null,raw:text,buf}}catch{}
      try{
        const recovered=new Uint8Array(text.length);for(let i=0;i<text.length;i++)recovered[i]=text.charCodeAt(i);
        const dec=pako.inflate(recovered);const s=new TextDecoder('utf-8').decode(dec);const d=JSON.parse(s);
        return{format:'json',data:d,encoder:null,raw:text,buf};
      }catch{}
    }
    return{format:'binary',data:bytes,encoder:null,raw:text,buf};
  }
  return{format:'log',data:text||'(empty file)',encoder:null,raw:text};
}

async function parseFile(file) {
  const ext=file.name.split('.').pop().toLowerCase();
  let text='', buf=null;
  try{text=await readText(file)}catch{}
  try{buf=await readBuf(file)}catch{}
  const t=(text||'').trim();

  // RMMZSAVE
  if(ext==='rmmzsave'){
    if(typeof LZString!=='undefined'){try{const dc=LZString.decompressFromBase64(t);if(dc&&dc.length>2){const d=JSON.parse(dc);return{format:'lzstring',data:d,encoder:d=>LZString.compressToBase64(JSON.stringify(d)),raw:text,buf}}}catch{}}
    try{const d=JSON.parse(t);return{format:'json',data:d,encoder:d=>JSON.stringify(d,null,2),raw:text,buf}}catch{}
    if(buf&&typeof pako!=='undefined'){
      try{const td=new TextDecoder('utf-8').decode(buf);const rc=new Uint8Array(td.length);for(let i=0;i<td.length;i++)rc[i]=td.charCodeAt(i);const dec=pako.inflate(rc);const json=new TextDecoder('utf-8').decode(dec);const d=JSON.parse(json);const encoder=d=>{const jb=new TextEncoder().encode(JSON.stringify(d));const comp=pako.deflate(jb,{level:1});let s='';for(let i=0;i<comp.length;i+=8192)s+=String.fromCharCode(...comp.slice(i,i+8192));return s};return{format:'rmmzsave',data:d,encoder,raw:text,buf}}catch{}
    }
  }
  // RPGSAVE
  if(ext==='rpgsave'||ext==='save'){
    if(typeof LZString!=='undefined'){try{const dc=LZString.decompressFromBase64(t);if(dc&&dc.length>2){const d=JSON.parse(dc);return{format:'lzstring',data:d,encoder:d=>LZString.compressToBase64(JSON.stringify(d)),raw:text,buf}}}catch{}}
    try{const d=JSON.parse(t);return{format:'json',data:d,encoder:d=>JSON.stringify(d,null,2),raw:text,buf}}catch{}
  }
  // ES3 / BAK
  if(ext==='es3'||ext==='bak'){
    try{const d=JSON.parse(t);return{format:'json',data:d,encoder:d=>JSON.stringify(d,null,2),raw:text,buf}}catch{}
    return{format:'es3',data:{_encrypted:true,_file:file.name,_size:file.size},encoder:null,raw:text,buf};
  }
  // VDF
  if(ext==='vdf'){try{const d=parseVDF(text);return{format:'vdf',data:d,encoder:d=>vdfStringify(d),raw:text}}catch{}}
  // YAML
  if(ext==='yml'||ext==='yaml'){
    try{const d=JSON.parse(t);return{format:'json',data:d,encoder:d=>JSON.stringify(d,null,2),raw:text}}catch{}
    try{const d=parseYAML(text);return{format:'yaml',data:d,encoder:d=>yamlStringify(d),raw:text}}catch{}
  }
  // XML
  if(ext==='xml'){
    try{const d=parseXML(text);return{format:'xml',data:d,encoder:null,raw:text}}catch(e){
      return{format:'log',data:`XML parse error: ${e.message}\n\n${text}`,encoder:null,raw:text};
    }
  }
  // SQLite
  if(ext==='db'||ext==='sqlite'||ext==='sqlite3'){
    if(buf&&isSQLite(new Uint8Array(buf)))return{format:'sqlite',data:parseSQLiteHeader(new Uint8Array(buf)),encoder:null,raw:text,buf};
    try{const d=JSON.parse(t);return{format:'json',data:d,encoder:d=>JSON.stringify(d,null,2),raw:text}}catch{}
  }
  // INI / Config
  if(['conf','opt','options','settings','prefs'].includes(ext)){
    try{const d=JSON.parse(t);return{format:'json',data:d,encoder:d=>JSON.stringify(d,null,2),raw:text}}catch{}
    try{const d=parseYAML(text);const k=Object.keys(d||{});if(k.length>0)return{format:'yaml',data:d,encoder:d=>yamlStringify(d),raw:text}}catch{}
    try{const d=parseINI(text);return{format:'ini',data:d,encoder:d=>iniStringify(d),raw:text}}catch{}
    return{format:'log',data:text,encoder:null,raw:text};
  }
  // Console binary saves
  if(CONSOLE_EXTS.has(ext)){
    if(buf){const b=new Uint8Array(buf);
      if(b[0]===0x4D&&b[1]===0x43)return{format:'json',data:parsePSXMemCard(b),encoder:null,raw:text,buf};
      return{format:'json',data:parseSRAMInfo(b,ext),encoder:null,raw:text,buf};
    }
  }
  // RVDATA2/3 — Ruby Marshal
  if(ext==='rvdata'||ext==='rvdata2'||ext==='rvdata3'||ext==='rxdata'){
    if(buf){try{const m=new Marshal(buf);return{format:'marshal',data:m.read(),encoder:null,raw:text,buf}}catch(e){return{format:'error',data:{_error:e.message},encoder:null,raw:text,buf}}}
  }
  // Log / text
  if(['log','txt','ini','cfg','csv'].includes(ext))return{format:'log',data:text,encoder:null,raw:text};
  // Generic saves — try everything
  if(GENERIC_EXTS.has(ext))return await tryGenericChain(text,buf,ext);
  // Fallback: content detection
  const r=await parseContent(text,buf);r.raw=r.raw||text;r.buf=r.buf||buf;return r;
}

// VDF parser
function parseVDF(text) {
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);
  const root = {}, stack = [root];
  let pk = null;
  for (const line of lines) {
    if(line==='{'){
      if(pk){const o={};stack[stack.length-1][pk]=o;stack.push(o);pk=null}
    } else if(line==='}'){
      if(stack.length>1)stack.pop();
    } else {
      const m=line.match(/^"([^"]*)"(?:\s+"([^"]*)")?/);
      if(m){m[2]!==undefined?stack[stack.length-1][m[1]]=m[2]:pk=m[1]}
    }
  }
  return root;
}

// ═══════════════════════════════════════════════════
// ES3 DECRYPT ENGINE (Web Crypto API)
// ═══════════════════════════════════════════════════
async function decryptES3(arrayBuffer, password){
  if(!arrayBuffer)return null;
  const bytes=new Uint8Array(arrayBuffer), enc=new TextEncoder();

  async function pbk(pwd,salt,iters=1000,bits=128){
    const km=await crypto.subtle.importKey('raw',enc.encode(pwd),'PBKDF2',false,['deriveKey']);
    const k=await crypto.subtle.deriveKey({name:'PBKDF2',salt:enc.encode(salt),iterations:iters,hash:'SHA-1'},km,{name:'AES-CBC',length:bits},true,['decrypt']);
    return new Uint8Array(await crypto.subtle.exportKey('raw',k));
  }
  async function pbkRaw(pwd,salt,iters=1000,bits=128){
    const km=await crypto.subtle.importKey('raw',enc.encode(pwd),'PBKDF2',false,['deriveKey']);
    const k=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:iters,hash:'SHA-1'},km,{name:'AES-CBC',length:bits},true,['decrypt']);
    return new Uint8Array(await crypto.subtle.exportKey('raw',k));
  }
  async function tryAES(keyBytes,iv,ct){
    try{
      if(!ct||ct.length%16!==0)return null;
      const k=await crypto.subtle.importKey('raw',keyBytes,'AES-CBC',false,['decrypt']);
      const pt=await crypto.subtle.decrypt({name:'AES-CBC',iv},k,ct);
      let txt=new TextDecoder('utf-8',{fatal:true}).decode(pt);
      txt=txt.replace(/[\x00-\x08\x0b\x0c\x0e-\x1f\x7f]/g,'').trim();
      if((txt.startsWith('{')||txt.startsWith('['))&&txt.includes('"'))return txt;
      return null;
    }catch{return null}
  }

  const iv0=bytes.slice(0,16), ct0=bytes.slice(16);
  const iv8=bytes.slice(8,24),  ct8=bytes.slice(24);
  const iv16=bytes.slice(16,32),ct16=bytes.slice(32);

  // Scheme A: raw UTF8 password zero-padded to 16B
  const rawKey=new Uint8Array(16); rawKey.set(enc.encode(password).slice(0,16));
  const rA=await tryAES(rawKey,iv0,ct0); if(rA)return{text:rA,scheme:'raw-key'};

  // Scheme B-F: PBKDF2 with various known ES3 salts
  const SALTS=['t*s3N4e','Easy Save 3','ES3','EasySave3','moodkie','unity','salt',''];
  for(const salt of SALTS){
    if(!salt)continue;
    const k=await pbk(password,salt).catch(()=>null); if(!k)continue;
    const r=await tryAES(k,iv0,ct0)||await tryAES(k,iv8,ct8)||await tryAES(k,iv16,ct16);
    if(r)return{text:r,scheme:`pbkdf2:${salt}`};
  }

  // Scheme G: file-embedded 8B salt + 16B IV
  const k8=await pbkRaw(password,bytes.slice(0,8)).catch(()=>null);
  if(k8){const r=await tryAES(k8,iv8,ct8);if(r)return{text:r,scheme:'salt8'}}

  // Scheme H: file-embedded 16B salt + 16B IV
  const k16=await pbkRaw(password,bytes.slice(0,16)).catch(()=>null);
  if(k16){const r=await tryAES(k16,iv16,ct16);if(r)return{text:r,scheme:'salt16'}}

  // Scheme I: SHA256 PBKDF2
  for(const salt of SALTS.slice(0,3)){
    try{
      const km=await crypto.subtle.importKey('raw',enc.encode(password),'PBKDF2',false,['deriveKey']);
      const ck=await crypto.subtle.deriveKey({name:'PBKDF2',salt:enc.encode(salt),iterations:1000,hash:'SHA-256'},km,{name:'AES-CBC',length:128},true,['decrypt']);
      const k=new Uint8Array(await crypto.subtle.exportKey('raw',ck));
      const r=await tryAES(k,iv0,ct0); if(r)return{text:r,scheme:`pbkdf2-sha256:${salt}`};
    }catch{}
  }
  return null;
}

async function decryptES3WithDict(arrayBuffer, onProgress){
  const total=ES3_DICT.length;
  for(let i=0;i<total;i++){
    const pwd=ES3_DICT[i];
    if(onProgress&&i%10===0)onProgress(i,total,pwd);
